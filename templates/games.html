<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - RetroNet</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/@ruffle-rs/ruffle@0.1.0-nightly.2024.12.17/ruffle.js"></script>
</head>
<body>
    <!-- Title Bar -->
    <div class="title-bar">
        <div class="title-text">🎮 Games - RetroNet</div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <a href="/" class="tab">🏠 Home</a>
        <a href="/chat" class="tab">💬 Chat</a>
        <a href="/voice" class="tab">🎤 Voice</a>
        <a href="/images" class="tab">🖼️ Images</a>
        <a href="/forum" class="tab">📝 Forum</a>
        <a href="/games" class="tab active">🎮 Games</a>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="window">
            <div class="window-title">🎮 Game Library</div>
            <div class="window-body">
                <!-- Game List -->
                <div id="game-list" class="game-list">
                    <p>Loading games...</p>
                </div>

                <!-- Game Container -->
                <div id="game-container" class="game-container" style="display: none;">
                    <div class="game-header">
                        <span id="game-title">Game Title</span>
                        <button id="back-to-list" class="btn-small">← Back to Games</button>
                    </div>
                    <div id="game-frame"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <span id="status">Loading...</span>
        <span id="time"></span>
    </div>

    <script src="/static/games.js"></script>
    <script>
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
